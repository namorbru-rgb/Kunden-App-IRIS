<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRIS Kunden-App</title>
  <style>
    :root {
      --bg: #eef3fb;
      --text: #0e1c2f;
      --muted: #70809a;
      --card: rgba(255,255,255,0.94);
      --line: rgba(113,132,168,0.14);
      --shadow: 0 20px 55px rgba(16, 31, 57, 0.12);
      --pv: #f8c64e;
      --battery: #4b7cff;
      --load: #4fd18e;
      --grid: #f55e68;
      --feed: #33d3c7;
      --leg: #8d6dff;
      --warn: #ff9c49;
    }
    * { box-sizing: border-box; }
    html,body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; color:var(--text); background:
      radial-gradient(circle at top left, rgba(75,124,255,.12), transparent 26%),
      linear-gradient(180deg, #f4f7fc 0%, #e9eff8 100%); }
    body { min-height:100vh; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 14px; }
    .top {
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom: 14px;
    }
    .brand { padding: 6px 4px; }
    .brand small { display:block; color:var(--muted); letter-spacing:.18em; text-transform:uppercase; font-size:.72rem; margin-bottom: 8px; }
    .brand h1 { margin:0; font-size: clamp(1.4rem, 2vw, 2rem); }
    .top-right { display:flex; gap:10px; align-items:center; }
    .ghost {
      background: rgba(255,255,255,.74); border:1px solid var(--line); box-shadow: var(--shadow);
      border-radius: 999px; padding: 10px 14px; font-size:.86rem; color:var(--muted);
    }
    .layout { display:grid; grid-template-columns: minmax(0,1fr) 320px; gap: 14px; }
    .card {
      background: var(--card); border:1px solid var(--line); box-shadow:var(--shadow); border-radius: 30px; padding: 16px;
    }
    .hero { padding: 10px; }
    .hero-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom: 4px; }
    .hero-head h2 { margin:0; font-size:1rem; }
    .hero-head span { color:var(--muted); font-size:.82rem; }
    .hero-main {
      display:grid; grid-template-columns: 1fr; align-items:center; gap: 4px;
      min-height: 430px; border-radius: 24px;
      background: linear-gradient(180deg, #fbfdff 0%, #f1f6fd 100%);
      border:1px solid var(--line); position:relative; overflow:hidden;
      padding: 8px 0;
    }
    .center-stage { position:relative; height:100%; min-height: 360px; display:grid; place-items:center; }
    .home-core {
      width: 172px; height: 172px; border-radius: 50%; background:
      radial-gradient(circle at 30% 30%, rgba(79,209,142,.2), rgba(79,209,142,.06) 35%, rgba(255,255,255,.96) 70%), #fff;
      border: 1px solid rgba(79,209,142,.2); box-shadow: 0 14px 32px rgba(79,209,142,.15), inset 0 0 0 11px rgba(79,209,142,.05);
      display:grid; place-items:center; text-align:center; padding: 14px; z-index:3;
    }
    .home-core .label { color:var(--muted); font-size:.74rem; }
    .home-core .value { font-size: 2.35rem; font-weight:800; line-height:1; margin: 4px 0; }
    .home-core .sub { font-size:.76rem; color:#4f6381; }
    svg.flow { position:absolute; inset:0; width:100%; height:100%; }
    .path { fill:none; stroke-linecap:round; opacity:.98; }
    .path.pv { stroke: var(--pv); }
    .path.battery { stroke: var(--battery); }
    .path.grid { stroke: var(--grid); }
    .path.feed { stroke: var(--feed); }
    .path.leg { stroke: var(--leg); }
    .path.vzev { stroke: var(--warn); }
    .path.idle { stroke: rgba(112,128,154,.32); stroke-dasharray: 3 6; }
    .particle { fill:none; stroke:rgba(255,255,255,.85); stroke-dasharray:2 10; stroke-linecap:round; }
    .floating-chip {
      position:absolute; background: rgba(255,255,255,.92); border:1px solid var(--line); border-radius: 999px; padding: 8px 12px; font-size:.8rem; color:#556983; z-index:3;
    }
    .chip-1 { top: 52px; left: 50%; transform: translateX(-50%); }
    .chip-2 { bottom: 52px; left: 50%; transform: translateX(-50%); }
    .chip-3 { top: 50%; right: 22px; transform: translateY(-50%); }
    .chip-4 { top: 50%; left: 22px; transform: translateY(-50%); }
    .orbit-metric {
      position:absolute; min-width:92px; text-align:center; padding:7px 9px; border-radius:15px;
      background: rgba(255,255,255,.9); border:1px solid var(--line); box-shadow: 0 12px 24px rgba(16,31,57,.08); z-index:3; cursor:pointer;
      backdrop-filter: blur(8px);
    }
    .orbit-metric .label { color:var(--muted); font-size:.66rem; margin-bottom:2px; }
    .orbit-metric .value { font-size:.9rem; font-weight:800; }
    .orbit-pv { top: 70px; left: 50%; transform: translateX(-50%); }
    .orbit-battery { bottom: 78px; left: 120px; }
    .orbit-leg { bottom: 78px; right: 120px; }
    .orbit-grid { top: 50%; right: 90px; transform: translateY(-50%); }
    .orbit-vzev { top: 50%; left: 90px; transform: translateY(-50%); }
    .side { display:grid; gap:14px; }
    .list { display:grid; gap:10px; }
    .row {
      background: linear-gradient(180deg, #fff, #f8fbff); border:1px solid var(--line); border-radius: 22px; padding: 13px 14px; cursor:pointer;
    }
    .row strong { display:block; font-size:.94rem; }
    .row small { display:block; color:var(--muted); margin-top:4px; }
    .seg { display:flex; flex-wrap:nowrap; gap:8px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
    .seg::-webkit-scrollbar { display:none; }
    .seg button, .bottom-nav button {
      border:0; cursor:pointer; border-radius:999px; padding:10px 14px; background:#eef3fb; color:#6f8099; font-weight:600; white-space:nowrap; flex:none;
    }
    .seg button.active, .bottom-nav button.active { background:#172748; color:#fff; }
    .timeline { padding:14px; }
    .title-nav { display:flex; align-items:center; gap:8px; }
    .step-btn {
      width:28px; height:28px; border-radius:999px; border:1px solid var(--line);
      background:#fff; color:var(--text); font-size:1.15rem; line-height:1;
      cursor:pointer; display:grid; place-items:center; padding:0;
    }
    .step-btn:hover { background:#f4f7fc; }
    .step-btn:disabled { opacity:.35; cursor:not-allowed; }
    .curve { height: 170px; border:1px solid var(--line); border-radius: 20px; background: linear-gradient(180deg,#f7faff,#eff4fb); overflow:hidden; margin-top:8px; }
    .time-axis { display:flex; justify-content:space-between; padding: 4px 10px 0; font-size:.7rem; color:var(--muted); }
    .slider { width:100%; margin-top:10px; accent-color: var(--battery); }
    .readout { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:6px; margin-top:10px; font-size:.8rem; }
    .readout button {
      display:flex; justify-content:space-between; gap:8px; padding:7px 10px;
      background:linear-gradient(180deg,#fff,#f8fbff); border:1px solid var(--line);
      border-radius:12px; align-items:center; cursor:pointer; text-align:left;
      font: inherit; color: var(--text); width:100%;
    }
    .readout button .lbl { display:inline-flex; align-items:center; gap:7px; }
    .readout button .lbl .dot { width:9px; height:9px; border-radius:50%; flex:none; transition: background .15s; }
    .readout button strong { font-weight:700; }
    .readout button.off { opacity:.5; }
    .readout button.off .lbl, .readout button.off strong { color: var(--muted); font-weight:500; }
    .readout button.off .dot { background:#c4ccd9 !important; }
    .readout button:hover { border-color:#cdd6e3; }
    .detail .kvs { display:grid; gap:10px; }
    .detail .kvs div { display:flex; justify-content:space-between; gap:10px; font-size:.9rem; padding-bottom:8px; border-bottom:1px solid var(--line); }
    .bottom-nav { position: sticky; bottom: 10px; display:flex; justify-content:center; margin-top: 14px; }
    .bottom-nav .bar {
      display:flex; gap:6px; padding: 8px; border-radius: 999px; background: rgba(255,255,255,.92); border:1px solid var(--line); box-shadow: var(--shadow);
      max-width: calc(100vw - 28px); overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
    }
    .bottom-nav .bar::-webkit-scrollbar { display:none; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .hero-main { min-height: 340px; padding: 6px 0; }
      .center-stage { min-height: 320px; }
    }
    @media (max-width: 620px) {
      .shell { padding: 6px 10px 10px; }
      .top { flex-wrap:nowrap; align-items:center; margin-bottom: 6px; gap: 8px; }
      .top-right { width:auto; }
      .brand { padding: 0; flex:1; min-width:0; }
      .brand small { display:none; }
      .brand h1 { font-size: 1.15rem; line-height:1.1; }
      .ghost { padding: 5px 10px; font-size: .74rem; }
      .hero { padding: 4px; }
      .hero-main { min-height: 280px; padding: 2px 0; border-radius: 20px; }
      .center-stage { min-height: 260px; }
      .home-core { width: 118px; height: 118px; padding: 8px; }
      .home-core .value { font-size: 1.45rem; margin: 2px 0; }
      .home-core .label, .home-core .sub { font-size: .66rem; }
      .floating-chip { display:none; }
      .orbit-metric { min-width: 72px; padding: 5px 7px; border-radius: 13px; }
      .orbit-metric .label { font-size: .58rem; margin-bottom:1px; }
      .orbit-metric .value { font-size: .76rem; }
      .orbit-pv { top: 8px; left: 50%; transform: translateX(-50%); }
      .orbit-grid { right: 8px; top: 50%; transform: translateY(-50%); }
      .orbit-vzev { left: 8px; top: 50%; transform: translateY(-50%); }
      .orbit-battery { left: 8px; bottom: 8px; }
      .orbit-leg { right: 8px; bottom: 8px; }
      .card { border-radius: 22px; padding: 12px; }
      .layout { gap: 10px; }
      .side { gap: 10px; }
      .timeline { padding: 10px; }
      .curve { height: 130px; margin-top: 6px; }
      .readout { grid-template-columns: repeat(2, 1fr); font-size: .74rem; gap:5px; margin-top:8px; }
      .readout button { padding: 6px 9px; }
      .step-btn { width:26px; height:26px; font-size:1rem; }
      .seg button, .bottom-nav button { padding: 8px 12px; font-size: .85rem; }
      .bottom-nav { bottom: 6px; margin-top: 10px; }
      .bottom-nav .bar { padding: 6px; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand">
        <small>IRIS · Kunden-App</small>
        <h1>Energiefluss</h1>
      </div>
      <div class="top-right">
        <div class="ghost" id="versionPill">Versionen · v17</div>
      </div>
    </div>

    <div class="layout">
      <div>
        <section class="card hero">
          <div class="hero-main">
            <div class="center-stage">
              <svg class="flow" viewBox="0 0 600 560" aria-label="Energiefluss">
                <defs>
                  <marker id="arrow-pv" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--pv)"/></marker>
                  <marker id="arrow-battery" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--battery)"/></marker>
                  <marker id="arrow-grid" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--grid)"/></marker>
                  <marker id="arrow-feed" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--feed)"/></marker>
                  <marker id="arrow-leg" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--leg)"/></marker>
                  <marker id="arrow-vzev" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="var(--warn)"/></marker>
                </defs>
                <g id="flowLayer"></g>
              </svg>
              <div class="home-core" onclick="showDetail('consumer')">
                <div class="label">Haus</div>
                <div class="value" id="houseValue">12.9</div>
                <div class="sub">kW</div>
              </div>
              <div class="floating-chip chip-1" id="chipPvHouse">PV → Haus 12.9 kW</div>
              <div class="floating-chip chip-2" id="chipBatteryHouse">PV → Batterie 5.1 kW</div>
              <div class="floating-chip chip-3" id="chipGrid">Netz / Einspeisung 4.7 kW</div>
              <div class="floating-chip chip-4" id="chipStatus">lokal versorgt</div>
              <div class="orbit-metric orbit-pv" onclick="showDetail('pv')"><div class="label">PV aktuell</div><div class="value" id="dayPv">28.7 kW</div></div>
              <div class="orbit-metric orbit-battery" onclick="showDetail('battery')"><div class="label" id="batteryOrbitLabel">Batterie · 88%</div><div class="value" id="batteryOrbitValue">+5.1 kW</div></div>
              <div class="orbit-metric orbit-grid" onclick="showDetail('grid')"><div class="label">Netz aktuell</div><div class="value" id="gridTodayValue">4.7 kW</div></div>
              <div class="orbit-metric orbit-leg" onclick="showDetail('leg')"><div class="label">LEG</div><div class="value" id="legValue">3.2 kW</div></div>
              <div class="orbit-metric orbit-vzev" onclick="showDetail('vzev')"><div class="label">vZEV</div><div class="value" id="vzevValue">1.4 kW</div></div>
            </div>
          </div>
        </section>

        <section class="card timeline">
          <div class="hero-head">
            <div class="title-nav">
              <button class="step-btn" id="stepPrev" onclick="stepTime(-1)" aria-label="zurück">‹</button>
              <h2>Zeitprofil</h2>
              <button class="step-btn" id="stepNext" onclick="stepTime(1)" aria-label="vor">›</button>
            </div>
            <span id="timeLabel">14:25</span>
          </div>
          <div class="seg" id="resolutionTabs"></div>
          <div class="curve" id="curveChart"></div>
          <div class="time-axis" id="timeAxis"></div>
          <input class="slider" id="timeSlider" type="range" min="0" max="5" value="3" />
          <div class="readout" id="profileReadout"></div>
        </section>
      </div>

      <div class="side">
        <section class="card detail">
          <div class="hero-head"><h2 id="detailTitle">Details</h2><span id="detailSub">Tap für Drilldown</span></div>
          <div class="kvs" id="detailKvs"></div>
        </section>
        <section class="card">
          <div class="hero-head"><h2>Teilnehmer</h2><span>bei Bedarf</span></div>
          <div class="list" id="participantList"></div>
        </section>
      </div>
    </div>

    <nav class="bottom-nav">
      <div class="bar" id="bottomNav"></div>
    </nav>
  </div>

  <script>
    const views = [
      { time:'06:15', date:'15.05.2026', pv:3.8, house:8.6, battery:-4.2, batteryMode:'entlädt', soc:82, grid:0.6, export:0, leg:1.1, vzev:0.4, heating:3.2, mobility:0.5, business:4.9, dayPv:9.8, dayLoad:21.4 },
      { time:'09:10', date:'15.05.2026', pv:16.4, house:10.1, battery:4.8, batteryMode:'lädt', soc:76, grid:0, export:1.5, leg:2.4, vzev:0.9, heating:2.8, mobility:1.4, business:5.9, dayPv:34.1, dayLoad:42.0 },
      { time:'12:40', date:'15.05.2026', pv:34.2, house:14.8, battery:6.3, batteryMode:'lädt', soc:91, grid:0, export:7.6, leg:3.8, vzev:1.6, heating:1.8, mobility:2.1, business:10.9, dayPv:78.5, dayLoad:61.7 },
      { time:'14:25', date:'15.05.2026', pv:28.7, house:12.9, battery:5.1, batteryMode:'lädt', soc:88, grid:0, export:4.7, leg:3.2, vzev:1.4, heating:4.1, mobility:1.8, business:7.0, dayPv:92.8, dayLoad:74.5 },
      { time:'17:55', date:'15.05.2026', pv:9.1, house:17.6, battery:-5.9, batteryMode:'entlädt', soc:73, grid:2.6, export:0, leg:1.4, vzev:1.1, heating:5.6, mobility:4.2, business:7.8, dayPv:108.5, dayLoad:98.2 },
      { time:'20:10', date:'15.05.2026', pv:0.5, house:11.8, battery:-6.2, batteryMode:'entlädt', soc:61, grid:5.1, export:0, leg:0.7, vzev:0.5, heating:4.8, mobility:2.6, business:4.4, dayPv:110.4, dayLoad:122.6 },
      { time:'Tag', date:'15.05.2026', pv:110.4, house:122.6, battery:22.3, batteryMode:'Hub', soc:61, grid:18.2, export:13.8, leg:12.1, vzev:18.4, heating:30.4, mobility:24.8, business:67.4, dayPv:110.4, dayLoad:122.6 },
      { time:'Monat', date:'Mai 2026', pv:2418, house:2186, battery:684, batteryMode:'Hub', soc:68, grid:358, export:592, leg:274, vzev:412, heating:548, mobility:436, business:1202, dayPv:2418, dayLoad:2186 }
    ];

    const seriesDefs = [
      { key:'pv',       label:'PV',        color:'#f8c64e', get: v => v.pv },
      { key:'house',    label:'Verbrauch', color:'#4fd18e', get: v => v.house },
      { key:'battery',  label:'Batterie',  color:'#4b7cff', get: v => Math.abs(v.battery) },
      { key:'soc',      label:'SOC',       color:'#0aa1a1', get: v => v.soc, unit:'%' },
      { key:'grid',     label:'Netz',      color:'#f55e68', get: v => Math.max(v.grid, v.export) },
      { key:'leg',      label:'LEG',       color:'#8d6dff', get: v => v.leg },
      { key:'vzev',     label:'vZEV',      color:'#ff9c49', get: v => v.vzev },
      { key:'heating',  label:'Heizung',   color:'#ff7090', get: v => v.heating },
      { key:'mobility', label:'Mobilität', color:'#5a8de0', get: v => v.mobility },
      { key:'business', label:'Gewerbe',   color:'#7a8aa3', get: v => v.business }
    ];
    const activeSeries = new Set(['pv','house','battery','grid']);
    const granularities = ['5 Min','10 Min','15 Min','Stunde','Tag','Monat'];
    let activeGranularity = '5 Min';

    const round1 = x => Math.round(x*10)/10;
    const numericFields = ['pv','house','battery','soc','grid','export','leg','vzev','heating','mobility','business'];
    const minuteOfDay = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    const dayAnchors = views.slice(0,6).map(v => ({ t: minuteOfDay(v.time), v }));

    function interpAtMinute(t, field) {
      if (t <= dayAnchors[0].t) return dayAnchors[0].v[field];
      const last = dayAnchors[dayAnchors.length-1];
      if (t >= last.t) return last.v[field];
      for (let i = 0; i < dayAnchors.length-1; i++) {
        if (t <= dayAnchors[i+1].t) {
          const r = (t - dayAnchors[i].t) / (dayAnchors[i+1].t - dayAnchors[i].t);
          return dayAnchors[i].v[field] * (1-r) + dayAnchors[i+1].v[field] * r;
        }
      }
      return 0;
    }

    function pointAtMinute(t) {
      const p = {
        time: `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`,
        date: '15.05.2026'
      };
      numericFields.forEach(f => p[f] = round1(interpAtMinute(t, f)));
      p.batteryMode = p.battery > 0.05 ? 'lädt' : (p.battery < -0.05 ? 'entlädt' : 'idle');
      return p;
    }

    function intraDayPoints(stepMin, count) {
      const endMin = 14*60 + 25;
      return Array.from({length:count}, (_,i) => pointAtMinute(Math.max(0, endMin - (count-1-i)*stepMin)));
    }

    const tagPoints = [];
    const monatPoints = [];
    (function buildAggregates(){
      for (let i = 6; i >= 0; i--) {
        const day = 15 - i;
        const fac = 0.7 + 0.35*Math.sin((day*1.3) % 6);
        tagPoints.push({
          time: `${day}.5.`, date: `${String(day).padStart(2,'0')}.05.2026`,
          pv: round1(110*fac), house: round1(122*(1.1-fac*0.2)),
          battery: round1(20*fac), batteryMode:'Hub', soc: 60+Math.round(15*fac),
          grid: round1(18*(1.2-fac)), export: round1(14*fac),
          leg: round1(12*fac), vzev: round1(18*fac),
          heating: round1(30*(1.2-fac*0.4)), mobility: round1(25*fac), business: round1(67*fac)
        });
      }
      const months = ['Jun 25','Jul 25','Aug 25','Sep 25','Okt 25','Nov 25','Dez 25','Jan 26','Feb 26','Mär 26','Apr 26','Mai 26'];
      for (let i = 0; i < 12; i++) {
        const fac = 0.45 + 0.55*Math.abs(Math.sin(i*0.55));
        monatPoints.push({
          time: months[i], date: months[i],
          pv: Math.round(1200+1500*fac), house: Math.round(2000+500*(1-fac*0.6)),
          battery: Math.round(450+350*fac), batteryMode:'Hub', soc: 55+Math.round(15*fac),
          grid: Math.round(300+400*(1-fac)), export: Math.round(250+450*fac),
          leg: Math.round(180+200*fac), vzev: Math.round(250+300*fac),
          heating: Math.round(450+250*(1-fac*0.5)), mobility: Math.round(340+150*fac), business: Math.round(750+800*fac)
        });
      }
    })();

    function buildPoints(g) {
      switch(g) {
        case '5 Min':  return intraDayPoints(5, 12);
        case '10 Min': return intraDayPoints(10, 12);
        case '15 Min': return intraDayPoints(15, 12);
        case 'Stunde': return intraDayPoints(60, 12);
        case 'Tag':    return tagPoints.slice();
        case 'Monat':  return monatPoints.slice();
      }
      return intraDayPoints(5, 12);
    }

    let chartPoints = buildPoints(activeGranularity);
    const aggGranularities = new Set(['Tag','Monat']);
    const currentUnit = () => aggGranularities.has(activeGranularity) ? 'kWh' : 'kW';

    const details = {
      consumer: [['Hausverbrauch','12.9 kW'],['Heizung','4.1 kW'],['Mobilität','1.8 kW'],['Gewerbe','7.0 kW'],['größter Verbraucher','CNC Maschine'],['Versorgung','PV + Batterie']],
      pv: [['PV aktuell','28.7 kW'],['Direkt ins Haus','12.9 kW'],['In Batterie','5.1 kW'],['Netzeinspeisung','4.7 kW'],['Tagesproduktion','92.8 kWh'],['Status','stabil']],
      battery: [['SOC','88 %'],['Leistung','+5.1 kW'],['Modus','lädt'],['Tageshub','41.6 kWh'],['Peak','22 kW'],['Quelle','PV']],
      grid: [['Netzbezug','0.0 kW'],['Einspeisung','4.7 kW'],['Öffentliches Netz','2.1 kW'],['vZEV','1.4 kW'],['LEG','1.2 kW'],['Status','ruhig']],
      leg: [['LEG Fluss','3.2 kW'],['Aktive Teilnehmer','3'],['Lokale Quote','81 %'],['Monatsvolumen','274 kWh'],['Top Teilnehmer','Haus A'],['Sichtbarkeit','sekundär']],
      vzev: [['vZEV Fluss','1.4 kW'],['Anschlüsse','4'],['Eigenverbrauch','78 %'],['Tagesvolumen','18.4 kWh'],['Status','aktiv'],['Sichtbarkeit','sekundär']],
      versions: [['v17','SOC als eigene Serie im Zeitprofil mit eigener 0–100 % Skala, gestrichelte Linie, Wert in % statt kW'],['v16','Auflösung wirkt jetzt echt: 5/10/15 Min und Stunde zeigen interpolierte Werte um 14:25, Tag liefert 7-Tage-Reihe, Monat 12-Monate-Reihe; Einheit wechselt zu kWh bei Aggregaten'],['v15','Header schlanker, Werte-Tabelle dient zugleich als An/Aus-Schalter pro Serie, Schritt-Pfeile zurück/vor neben "Zeitprofil", Auflösung-Tabs anklickbar (5/10/15 Min, Stunde, Tag, Monat)'],['v14','Zeitprofil komplett überarbeitet: Toggle-Chips für PV/Haus/Batterie/Netz/LEG/vZEV/Heizung/Mobilität/Gewerbe, Uhrzeit-Achse, Werte-Tabelle am Schiebereglerpunkt'],['v13','Flussrichtung korrigiert: bei PV-Überschuss zeigen Batterie/Netz/LEG/vZEV vom Haus weg, bei Bezug zum Haus hin'],['v12','LEG und vZEV als feste Orbit-Pillen ergänzt, Batterie+SOC zu einer Pille kombiniert, ruhende Flusslinien gestrichelt'],['v11','Mobile-Layout deutlich kompakter: Haus-Kreis 118 px, schmalere Orbit-Pillen, Stage 260 px, Timeline und Bottom-Nav dichter'],['v10','Pfeilspitzen entglubt: feste Pixelgröße statt strokeWidth-Skalierung, Pfade enden bündig am Kreis, schlankere Linien'],['v9','Mobile-Cleanup: Flusslinien dynamisch am Haus-Kreis verankert, tote Doppel-Karten entfernt, Tab-Reihen scrollbar'],['v8','Layout kompakter: weniger Weissraum, Orbit-Elemente enger, Navigation dichter'],['v7','Doppelte Werte entfernt: Seitenkarten ausgeblendet, Batterie als Orbit-Wert'],['v6','Haus-Kreis nochmals verkleinert'],['v5','Haus-Kreis kleiner und Orbit-Werte auf aktuelle Leistung statt Tageswerte umgestellt'],['v4','Versionsverlauf oben rechts sichtbar, Uhrzeit entfernt'],['v3','Versionsanzeige aus Hauptscreen entfernt und Live-Stand aktiviert'],['v2','Tageswerte aus Karten in den Energiefluss rund ums Haus verschoben'],['v1','Hauptscreen radikal vereinfacht'],['Status','UI only']]
    };

    const participants = [
      ['Haus A','2.4 kW Bezug · 74% PV'],['Werkhalle Nord','1.8 kW Bezug · 48% PV'],['Mieter Süd','0.8 kW Bezug · 82% PV']
    ];

    let active = chartPoints.length - 1;
    let detail = 'consumer';

    function renderFlow() {
      const v = chartPoints[active];
      const stage = document.querySelector('.center-stage');
      const svg = document.querySelector('svg.flow');
      const core = document.querySelector('.home-core');
      const layer = document.getElementById('flowLayer');
      const W = stage.clientWidth, H = stage.clientHeight;
      if (!W || !H) { requestAnimationFrame(renderFlow); return; }
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      const stageBox = stage.getBoundingClientRect();
      const coreBox = core.getBoundingClientRect();
      const cx = coreBox.left + coreBox.width/2 - stageBox.left;
      const cy = coreBox.top + coreBox.height/2 - stageBox.top;
      const coreR = coreBox.width/2;

      function pathFromOrbit(sel, outbound) {
        const o = document.querySelector(sel);
        if (!o) return null;
        const ob = o.getBoundingClientRect();
        if (!ob.width) return null;
        const ox = ob.left + ob.width/2 - stageBox.left;
        const oy = ob.top + ob.height/2 - stageBox.top;
        const dx = cx - ox, dy = cy - oy;
        const dist = Math.hypot(dx, dy) || 1;
        const ux = dx/dist, uy = dy/dist;
        const hx = ob.width/2 + 4, hy = ob.height/2 + 4;
        const tEdge = Math.min(Math.abs(ux) > 1e-3 ? hx/Math.abs(ux) : Infinity,
                               Math.abs(uy) > 1e-3 ? hy/Math.abs(uy) : Infinity);
        const sx = ox + ux * tEdge;
        const sy = oy + uy * tEdge;
        const ex = cx - ux * (coreR + 6);
        const ey = cy - uy * (coreR + 6);
        const bend = Math.min(22, dist * 0.14);
        const mx = (sx+ex)/2 + uy * bend;
        const my = (sy+ey)/2 - ux * bend;
        if (outbound) {
          return `M ${ex.toFixed(1)} ${ey.toFixed(1)} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${sx.toFixed(1)} ${sy.toFixed(1)}`;
        }
        return `M ${sx.toFixed(1)} ${sy.toFixed(1)} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
      }

      const pvToHouse = Math.min(v.pv, v.house);
      const battToHouse = v.battery < 0 ? Math.abs(v.battery) : 0;
      const pvToBattery = v.battery > 0 ? v.battery : 0;
      const gridToHouse = v.grid;
      const exportFlow = v.export;
      const surplus = v.pv > v.house;

      const specs = [
        { sel:'.orbit-pv',      cls:'pv',      arrow:'pv',      mag: pvToHouse,                              outbound: false },
        { sel:'.orbit-battery', cls:'battery', arrow:'battery', mag: Math.max(pvToBattery, battToHouse),     outbound: v.battery > 0 },
        { sel:'.orbit-grid',    cls: gridToHouse>0?'grid':'feed', arrow: gridToHouse>0?'grid':'feed',
                                                                 mag: Math.max(gridToHouse, exportFlow),     outbound: exportFlow > 0 },
        { sel:'.orbit-leg',     cls:'leg',     arrow:'leg',     mag: v.leg,                                  outbound: surplus },
        { sel:'.orbit-vzev',    cls:'vzev',    arrow:'vzev',    mag: v.vzev,                                 outbound: surplus }
      ];
      const lines = specs
        .map(s => ({ ...s, d: pathFromOrbit(s.sel, s.outbound), w: Math.max(2.5, Math.min(6, 2.5 + Math.log2(1 + s.mag) * 0.9)) }))
        .filter(s => s.d);

      layer.innerHTML = lines.map(l => {
        if (l.mag <= 0) {
          return `<path class="path idle" d="${l.d}" stroke-width="1.5"></path>`;
        }
        return `
          <path class="path ${l.cls}" d="${l.d}" stroke-width="${l.w}" marker-end="url(#arrow-${l.arrow})"></path>
          <path class="particle" d="${l.d}" stroke-width="${Math.max(1.5,l.w*.22)}"><animate attributeName="stroke-dashoffset" from="120" to="0" dur="${Math.max(1.2,6/Math.max(l.w,1))}s" repeatCount="indefinite" /></path>
        `;
      }).join('');

      const unit = currentUnit();
      document.getElementById('chipPvHouse').textContent = `PV → Haus ${pvToHouse} ${unit}`;
      document.getElementById('chipBatteryHouse').textContent = v.battery > 0 ? `PV → Batterie ${pvToBattery} ${unit}` : `Batterie → Haus ${battToHouse} ${unit}`;
      document.getElementById('chipGrid').textContent = gridToHouse > 0 ? `Netz → Haus ${gridToHouse} ${unit}` : `Einspeisung ${exportFlow} ${unit}`;
      document.getElementById('chipStatus').textContent = gridToHouse > 0 ? 'teilweise Netzbezug' : 'lokal versorgt';
    }

    function renderMain() {
      const v = chartPoints[active];
      const unit = currentUnit();
      document.getElementById('houseValue').textContent = v.house;
      document.getElementById('dayPv').textContent = `${v.pv} ${unit}`;
      document.getElementById('batteryOrbitValue').textContent = `${v.battery>0?'+':''}${v.battery} ${unit}`;
      document.getElementById('batteryOrbitLabel').textContent = `Batterie · ${v.soc}%`;
      document.getElementById('gridTodayValue').textContent = `${(v.grid>0?v.grid:v.export)} ${unit}`;
      document.getElementById('legValue').textContent = `${v.leg} ${unit}`;
      document.getElementById('vzevValue').textContent = `${v.vzev} ${unit}`;
      document.getElementById('timeLabel').textContent = v.time;
      renderFlow();
    }

    function showDetail(key) {
      detail = key;
      const titleMap = { consumer:'Haus / Verbrauch', pv:'PV', battery:'Batterie', grid:'Netz', leg:'LEG', vzev:'vZEV', versions:'Versionsverlauf' };
      document.getElementById('detailTitle').textContent = titleMap[key] || 'Details';
      document.getElementById('detailSub').textContent = key === 'versions' ? 'letzte sichtbare Änderungen' : 'aktueller Drilldown';
      const kvs = document.getElementById('detailKvs');
      kvs.innerHTML = (details[key] || details.consumer).map(([a,b])=>`<div><span>${a}</span><strong>${b}</strong></div>`).join('');
      renderBottomNav();
    }

    function renderParticipants() {
      document.getElementById('participantList').innerHTML = participants.map(([a,b])=>`<div class="row" onclick="showDetail('leg')"><strong>${a}</strong><small>${b}</small></div>`).join('');
    }

    function renderTimeline() {
      document.getElementById('resolutionTabs').innerHTML = granularities.map(r =>
        `<button class="${r===activeGranularity?'active':''}" onclick="setGranularity('${r}')">${r}</button>`
      ).join('');

      const pts = chartPoints;
      const N = pts.length;
      const visible = seriesDefs.filter(s => activeSeries.has(s.key));
      const energyVisible = visible.filter(s => s.unit !== '%');
      const energyScale = energyVisible.length ? energyVisible : seriesDefs.filter(s => s.unit !== '%');
      const maxY = Math.max(0.1, ...energyScale.flatMap(s => pts.map(p => s.get(p))));

      const W = 620, H = 170, PX = 28, PY = 14;
      const xAt = i => N <= 1 ? W/2 : PX + i * (W - 2*PX) / (N-1);
      const yEnergy = val => H - PY - (val/maxY) * (H - 2*PY - 6);
      const yPct = val => H - PY - (val/100) * (H - 2*PY - 6);
      const yFor = s => s.unit === '%' ? yPct : yEnergy;

      const gridLines = [0.25,0.5,0.75,1].map(f =>
        `<line x1="0" y1="${(H-PY) - f*(H-2*PY-6)}" x2="${W}" y2="${(H-PY) - f*(H-2*PY-6)}" stroke="#6f84a3" opacity=".11"/>`
      ).join('');

      const lines = visible.map(s => {
        const yFn = yFor(s);
        const points = pts.map((p,i) => `${xAt(i).toFixed(0)},${yFn(s.get(p)).toFixed(0)}`).join(' ');
        const dash = s.unit === '%' ? ' stroke-dasharray="6 4"' : '';
        return `<polyline fill="none" stroke="${s.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${points}" opacity=".92"${dash}/>`;
      }).join('');

      const cIdx = Math.min(Math.max(active,0), N-1);
      const cx = xAt(cIdx);
      const cursor = `<line x1="${cx}" x2="${cx}" y1="${PY-4}" y2="${H-PY+4}" stroke="var(--battery)" stroke-width="2" stroke-dasharray="4 6" opacity=".7"/>` +
        visible.map(s => `<circle cx="${cx}" cy="${yFor(s)(s.get(pts[cIdx])).toFixed(0)}" r="3.5" fill="${s.color}" stroke="#fff" stroke-width="2"/>`).join('');

      document.getElementById('curveChart').innerHTML =
        `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${gridLines}${lines}${cursor}</svg>`;

      const maxLabels = 6;
      const stride = Math.max(1, Math.ceil(N / maxLabels));
      document.getElementById('timeAxis').innerHTML = pts.map((p,i) =>
        (i === 0 || i === N-1 || i % stride === 0) ? `<span>${p.time}</span>` : `<span></span>`
      ).join('');

      const slider = document.getElementById('timeSlider');
      slider.max = String(N - 1);
      if (Number(slider.value) !== active) slider.value = String(active);

      document.getElementById('stepPrev').disabled = active <= 0;
      document.getElementById('stepNext').disabled = active >= N - 1;

      renderReadout();
    }

    function toggleSeries(key) {
      if (activeSeries.has(key)) activeSeries.delete(key);
      else activeSeries.add(key);
      renderTimeline();
    }

    function setGranularity(g) {
      if (activeGranularity === g) return;
      activeGranularity = g;
      chartPoints = buildPoints(g);
      active = chartPoints.length - 1;
      renderMain();
      renderTimeline();
    }

    function stepTime(delta) {
      const next = Math.max(0, Math.min(chartPoints.length - 1, active + delta));
      if (next === active) return;
      active = next;
      renderMain();
      renderTimeline();
    }

    function renderReadout() {
      const v = chartPoints[active];
      const energyUnit = currentUnit();
      document.getElementById('profileReadout').innerHTML = seriesDefs.map(s => {
        const on = activeSeries.has(s.key);
        const unit = s.unit === '%' ? '%' : energyUnit;
        const val = s.unit === '%' ? Math.round(s.get(v)) : s.get(v).toFixed(1);
        return `<button class="${on?'':'off'}" onclick="toggleSeries('${s.key}')">
          <span class="lbl"><span class="dot" style="background:${s.color}"></span>${s.label}</span>
          <strong>${val} ${unit}</strong>
        </button>`;
      }).join('');
    }

    function renderBottomNav() {
      const items = [['Übersicht','consumer'],['PV','pv'],['Batterie','battery'],['Netz','grid'],['LEG','leg'],['vZEV','vzev'],['Versionen','versions']];
      document.getElementById('bottomNav').innerHTML = items.map(([a,b])=>`<button class="${detail===b?'active':''}" onclick="showDetail('${b}')">${a}</button>`).join('');
    }

    document.getElementById('versionPill').onclick = ()=>showDetail('versions');
    document.getElementById('timeSlider').addEventListener('input', e => {
      active = Math.max(0, Math.min(chartPoints.length - 1, Number(e.target.value)));
      renderMain();
      renderTimeline();
    });
    window.addEventListener('resize', () => requestAnimationFrame(renderFlow));

    renderParticipants();
    renderMain();
    renderTimeline();
    showDetail('consumer');
    requestAnimationFrame(renderFlow);
  </script>
</body>
</html>
